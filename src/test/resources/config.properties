# ============================================================
# IBM ShopZ Automation Framework - Configuration Properties
# ============================================================

# Base Application URL
base.url=https://www.ibm.com/software/shopzseries/ShopzSeries_public.wss?action=prodcat

# Browser Configuration
browser=chrome
headless=false

# Implicit & Explicit Wait (seconds)
implicit.wait=10
explicit.wait=20
page.load.timeout=30

# Screenshot on failure
screenshot.on.failure=true
screenshot.path=screenshots/

# Reports
report.path=reports/
report.name=IBMShopzTestReport
report.title=IBM ShopZ Automation Report

# Logs
log.path=logs/

# Test Data - Country Options
country.default=United States

# Test Data - Package Types (as shown in doc)
package.type.linux=Linux on z-Standalone products and fixes
package.type.zos.osmf=z/OS-z/OSMF Portable Software Instance (ServerPac - system, subsystem or products)
package.type.zos.cbpdo=z/OS-CBPDO (products)
package.type.zos.open=z/OS-Open Source SW on z/OS (CBPDO)
package.type.zvm=z/VM-VM SDO version 7
package.type.zvse=z/VSE-VSE SIPO version 6

# Catalog Page
catalog.page.url=https://www.ibm.com/software/shopzseries/ShopzSeries_public.wss?action=prodcat

# Login Page
login.page.url=https://www.ibm.com/software/shopzseries/ShopzSeries.wss?action=login
